name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: agentic_ledger
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # Install ONLY what's needed
    - name: Install dependencies
      run: |
        pip install asyncpg pydantic
    
    # Add src to Python path
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> $GITHUB_ENV
    
    # Run database schema
    - name: Setup database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d agentic_ledger -f src/core/schema.sql
      env:
        PGPASSWORD: postgres
    
    # SIMPLE VERIFICATION - just check if imports work
    - name: Verify imports
      run: |
        python -c "
        import sys
        sys.path.append('src')
        print('✓ Can import from src')
        try:
            from core.event_store import EventStore
            print('✓ EventStore imported')
            from models.events import BaseEvent
            print('✓ BaseEvent imported')
            print('✅ All imports successful!')
        except ImportError as e:
            print(f'❌ Import failed: {e}')
            sys.exit(1)
        "