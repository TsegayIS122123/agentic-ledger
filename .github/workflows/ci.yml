name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # Install pytest only
    - name: Install pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    
    # Run the placeholder test
    - name: Run tests
      run: |
        pytest tests/test_placeholder.py -v
    
    # Show directory structure (helpful for debugging)
    - name: Show structure
      run: |
        echo "📁 Project structure:"
        ls -la
        echo ""
        echo "📁 src directory:"
        ls -la src || echo "src directory not found"
        echo ""
        echo "📁 tests directory:"
        ls -la tests