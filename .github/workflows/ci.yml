name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: agentic_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # SIMPLE: Use pip instead of UV to avoid build issues
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov ruff mypy
    
    - name: Setup database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d agentic_ledger_test -f src/core/schema.sql
      env:
        PGPASSWORD: postgres
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: agentic_ledger_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
    
    - name: Run linting
      run: |
        ruff check src/ tests/
    
    - name: Run type checks
      run: |
        mypy src/ --ignore-missing-imports